name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # On build sur l'infra de GitHub pour ne pas charger ton VPS
      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: |
            dist/*
            server/*
            package.json
            package-lock.json
          target: ${{ secrets.VPS_TARGET_PATH }}
          strip_components: 1 # Pour enlever le dossier "dist/" et mettre le contenu directement dans TARGET_PATH

      - name: Post-deploy SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ secrets.VPS_TARGET_PATH }}
            npm install --omit=dev
            npm install -g pm2
            pm2 delete all || true
            pm2 start server/index.js --name webapp-back
