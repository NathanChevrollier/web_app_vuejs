name: Full Auto Deploy (Front & Back)

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Vitest unit tests
        run: npm run test:unit

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 1. BUILD DU FRONT (Sur GitHub pour économiser la RAM de ton VPS)
      - name: Install & Build Front
        run: |
          npm install
          npm run build

      # 2. TRANSFERT DES FICHIERS (On envoie tout ce qui est nécessaire)
      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          # On envoie le build (dist), le code du back (server), et les fichiers de dépendances
          source: 'dist/,package.json,package-lock.json,server/'
          target: ${{ secrets.VPS_TARGET_PATH }}
          strip_components: 0

      - name: Post-deploy SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin:/usr/bin

            cd ${{ secrets.VPS_TARGET_PATH }}

            npm install --omit=dev

            pm2 reload webapp-back || pm2 start server/index.js --name webapp-back
            pm2 save
