name: Full Auto Deploy (Front & Back)

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 1. BUILD DU FRONT (Sur GitHub pour économiser la RAM de ton VPS)
      - name: Install & Build Front
        run: |
          npm install
          npm run build

      # 2. TRANSFERT DES FICHIERS (On envoie tout ce qui est nécessaire)
      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          # On envoie le build (dist), le code du back (server), et les fichiers de dépendances
          source: 'dist/,package.json,package-lock.json,server/'
          target: ${{ secrets.VPS_TARGET_PATH }}
          strip_components: 0 # On garde la structure pour que 'dist' reste 'dist'

      # 3. RELOAD & INSTALL SUR LE VPS (La magie opère ici)
      - name: Post-deploy SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ secrets.VPS_TARGET_PATH }}

            # Installation des dépendances de production uniquement (gain de place)
            npm install --omit=dev

            # Installation de PM2 si absent (global)
            sudo npm install -g pm2 || true

            # Gestion du Back-end avec PM2
            # On essaie de recharger sans coupure (reload), sinon on démarre (start)
            pm2 reload webapp-back || pm2 start server/index.js --name webapp-back

            # Sauvegarde de la liste PM2 pour qu'elle survive au reboot du VPS
            pm2 save
